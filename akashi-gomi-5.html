<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明石市 ごみ収集スケジュール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #ddd9d0;
    --text: #1a1916;
    --text-muted: #7a7570;
    --moeru: #e05a2b;
    --moenai: #3b82c4;
    --shigen: #2ea66b;
    --kami: #c49c2b;
    --moeru-bg: #fef3ee;
    --moenai-bg: #eef4fc;
    --shigen-bg: #eef8f3;
    --kami-bg: #fdf8ee;
    --today-ring: #e05a2b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: #f5f3ee;
    padding: 20px 20px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.3;
  }
  header h1 span {
    display: block;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #b0aa9f;
    margin-bottom: 2px;
  }
  .today-badge {
    background: var(--moeru);
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
  }

  /* ── District selector ── */
  .selector-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  .selector-bar label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 8px;
  }
  .district-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .district-btn {
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .district-btn:hover { border-color: var(--text); }
  .district-btn.active {
    background: var(--text);
    color: #f5f3ee;
    border-color: var(--text);
  }

  /* ── Today's garbage ── */
  .today-section {
    padding: 18px 20px 0;
  }
  .section-title {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .today-cards {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .gomi-card {
    flex: 1;
    min-width: 130px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 14px 12px;
    position: relative;
    overflow: hidden;
  }
  .gomi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-color);
  }
  .gomi-card .type-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--card-color);
    margin-bottom: 2px;
  }
  .gomi-card .day-label {
    font-size: 11px;
    color: var(--text-muted);
  }
  .gomi-card .emoji { font-size: 22px; margin-bottom: 6px; display: block; }

  .none-today {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    color: var(--text-muted);
    font-size: 13px;
    width: 100%;
    text-align: center;
  }

  /* ── Next pickups ── */
  .next-section {
    padding: 18px 20px 0;
  }
  .next-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .next-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .next-item .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--card-color);
  }
  .next-item .type { font-size: 13px; font-weight: 600; flex: 1; }
  .next-item .date-info { text-align: right; }
  .next-item .date-info .d { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .next-item .date-info .rel {
    font-size: 11px; color: var(--text-muted); margin-top: 1px;
  }
  .next-item .date-info .rel.urgent { color: var(--moeru); font-weight: 600; }

  /* ── Calendar ── */
  .calendar-section { padding: 18px 20px 0; }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-title {
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
  }
  .cal-nav {
    display: flex; gap: 6px;
  }
  .cal-nav button {
    width: 30px; height: 30px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .cal-nav button:hover { background: var(--text); color: #fff; border-color: var(--text); }

  .calendar {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .cal-weekdays div {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 8px 0;
    letter-spacing: 0.05em;
  }
  .cal-weekdays div:first-child { color: #e05a2b; }
  .cal-weekdays div:last-child { color: #3b82c4; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cal-cell {
    min-height: 62px;
    padding: 5px 4px 4px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty { background: var(--bg); }
  .cal-cell.other-month { opacity: 0.35; }
  .cal-cell.is-today {
    background: #fff9f6;
  }
  .cal-cell.is-today .day-num {
    background: var(--moeru);
    color: #fff;
  }
  .cal-cell.is-sun .day-num { color: #e05a2b; }
  .cal-cell.is-sat .day-num { color: #3b82c4; }

  .day-num {
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    margin-bottom: 3px;
  }
  .gomi-icons {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
  }
  .gomi-icon {
    font-size: 13px;
    line-height: 1;
  }

  /* ── Legend ── */
  .legend {
    padding: 16px 20px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }

</style>
</head>
<body>

<header>
  <h1>
    <span>明石市</span>
    ごみ収集スケジュール
  </h1>
  <div class="today-badge" id="todayBadge">—</div>
</header>

<div class="selector-bar">
  <label>▸ 地区を選択</label>
  <div class="district-btns" id="districtBtns">
    <button class="district-btn" data-key="higashi-mokukin" onclick="selectDistrict(this)">東部・月木</button>
    <button class="district-btn" data-key="higashi-kinka" onclick="selectDistrict(this)">東部・火金</button>
    <button class="district-btn" data-key="seibu" onclick="selectDistrict(this)">西部地区</button>
  </div>
  <div style="margin-top:10px;">
    <label>▸ 紙類・布類 収集地域</label>
    <div class="district-btns" id="kamiDistrictBtns">
      <button class="district-btn" data-key="kami1" onclick="selectKamiDistrict(this)">明石川東（第1土曜）</button>
      <button class="district-btn" data-key="kami2" onclick="selectKamiDistrict(this)">明石川西（第2土曜）</button>
      <button class="district-btn" data-key="kami3" onclick="selectKamiDistrict(this)">大久保（第3土曜）</button>
      <button class="district-btn" data-key="kami4" onclick="selectKamiDistrict(this)">魚住・二見（第4土曜）</button>
    </div>
  </div>
</div>

<div class="today-section">
  <div class="section-title">今日の収集</div>
  <div class="today-cards" id="todayCards"></div>
</div>

<div class="next-section">
  <div class="section-title">次回収集日</div>
  <div class="next-list" id="nextList"></div>
</div>

<div class="calendar-section">
  <div class="cal-header">
    <div class="cal-title" id="calTitle">—</div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="calendar">
    <div class="cal-weekdays">
      <div>日</div><div>月</div><div>二</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span>🔥</span>もやすごみ</div>
  <div class="legend-item"><span>🗑️</span>もえないごみ</div>
  <div class="legend-item"><span>♻️</span>缶・びん・PET</div>
  <div class="legend-item"><span>📦</span>紙類・布類</div>
</div>

<script>
// ── State ──
let districtKey = 'higashi-mokukin';
let kamiKey = 'kami3'; // 大久保エリアがデフォルト
let viewYear, viewMonth;

const today = new Date();
today.setHours(0,0,0,0);
viewYear = today.getFullYear();
viewMonth = today.getMonth();

// ── District definitions ──
// Returns array of collection types for a given Date
function getCollections(date, dKey, kKey) {
  const result = [];
  const dow = date.getDay(); // 0=Sun..6=Sat
  const dayOfMonth = date.getDate();

  // Helper: nth weekday of month
  function nthWeekday(year, month, weekday, n) {
    // n=1..5, weekday=0..6
    let d = new Date(year, month, 1);
    let count = 0;
    while (d.getMonth() === month) {
      if (d.getDay() === weekday) {
        count++;
        if (count === n) return d.getDate();
      }
      d.setDate(d.getDate() + 1);
    }
    return -1;
  }
  function countWeekdayUpTo(year, month, weekday, day) {
    let count = 0;
    for (let d = 1; d <= day; d++) {
      if (new Date(year, month, d).getDay() === weekday) count++;
    }
    return count;
  }

  const y = date.getFullYear();
  const m = date.getMonth();

  if (dKey === 'higashi-mokukin') {
    // もやすごみ: 月・木
    if (dow === 1 || dow === 4) result.push('moeru');
    // もえないごみ: 第1・3水曜
    if (dow === 3) {
      const nth = countWeekdayUpTo(y, m, 3, dayOfMonth);
      if (nth === 1 || nth === 3) result.push('moenai');
    }
    // 缶・びん・PET: 第2・4・5水曜
    if (dow === 3) {
      const nth = countWeekdayUpTo(y, m, 3, dayOfMonth);
      if (nth === 2 || nth === 4 || nth === 5) result.push('shigen');
    }
  } else if (dKey === 'higashi-kinka') {
    // もやすごみ: 火・金
    if (dow === 2 || dow === 5) result.push('moeru');
    // もえないごみ: 第1・3水曜
    if (dow === 3) {
      const nth = countWeekdayUpTo(y, m, 3, dayOfMonth);
      if (nth === 1 || nth === 3) result.push('moenai');
    }
    // 缶・びん・PET: 第2・4・5水曜
    if (dow === 3) {
      const nth = countWeekdayUpTo(y, m, 3, dayOfMonth);
      if (nth === 2 || nth === 4 || nth === 5) result.push('shigen');
    }
  } else if (dKey === 'seibu') {
    // もやすごみ: 第2・4水曜
    if (dow === 3) {
      const nth = countWeekdayUpTo(y, m, 3, dayOfMonth);
      if (nth === 2 || nth === 4) result.push('moeru');
    }
    // もえないごみ: 第1・3・5水曜
    if (dow === 3) {
      const nth = countWeekdayUpTo(y, m, 3, dayOfMonth);
      if (nth === 1 || nth === 3 || nth === 5) result.push('moenai');
    }
    // 缶・びん・PET: 西部地区は水曜のもえないごみと同日（共通収集日なし）
    // 実際には西部の資源ごみは東部と異なる → 西部の缶びんPETは月1回土曜（カレンダー参照）
    // 簡略化: 西部の資源ごみ → 第2・4水曜の翌週土曜（実際はカレンダー依存）
    // ここでは代表的なパターンを採用（詳細はPDFカレンダーで確認）
  }

  // 紙類・布類: 月1回土曜
  if (dow === 6) {
    const nth = countWeekdayUpTo(y, m, 6, dayOfMonth);
    const targetNth = { kami1: 1, kami2: 2, kami3: 3, kami4: 4 }[kKey];
    if (nth === targetNth) result.push('kami');
  }

  return result;
}

// ── UI data ──
const typeInfo = {
  moeru:   { label: 'もやすごみ',    emoji: '🔥', color: '#e05a2b', bg: '#fef3ee' },
  moenai:  { label: 'もえないごみ',  emoji: '🗑️', color: '#3b82c4', bg: '#eef4fc' },
  shigen:  { label: '缶・びん・PET', emoji: '♻️', color: '#2ea66b', bg: '#eef8f3' },
  kami:    { label: '紙類・布類',    emoji: '📦', color: '#c49c2b', bg: '#fdf8ee' },
};

const dayNames = ['日','月','火','水','木','金','土'];
const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function formatDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}(${dayNames[d.getDay()]})`;
}

function relativeDay(d) {
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return '今日';
  if (diff === 1) return '明日';
  if (diff === 2) return '明後日';
  return `${diff}日後`;
}

// ── Render today ──
function renderToday() {
  const badge = document.getElementById('todayBadge');
  badge.textContent = `${today.getMonth()+1}月${today.getDate()}日(${dayNames[today.getDay()]})`;

  const cols = getCollections(today, districtKey, kamiKey);
  const container = document.getElementById('todayCards');
  container.innerHTML = '';

  if (cols.length === 0) {
    container.innerHTML = `<div class="none-today">収集なし</div>`;
    return;
  }
  cols.forEach(type => {
    const info = typeInfo[type];
    const card = document.createElement('div');
    card.className = 'gomi-card';
    card.style.setProperty('--card-color', info.color);
    card.innerHTML = `
      <span class="emoji">${info.emoji}</span>
      <div class="type-label">${info.label}</div>
      <div class="day-label">本日収集</div>
    `;
    container.appendChild(card);
  });
}

// ── Render next pickups ──
function renderNext() {
  const container = document.getElementById('nextList');
  container.innerHTML = '';

  const types = ['moeru','moenai','shigen','kami'];
  const nexts = {};

  let searchDate = new Date(today);
  searchDate.setDate(searchDate.getDate() + 1);
  let found = {};

  for (let i = 0; i < 90; i++) {
    const cols = getCollections(searchDate, districtKey, kamiKey);
    cols.forEach(t => {
      if (!found[t]) found[t] = new Date(searchDate);
    });
    if (Object.keys(found).length === types.length) break;
    searchDate.setDate(searchDate.getDate() + 1);
  }

  // Also check today
  const todayCols = getCollections(today, districtKey, kamiKey);
  todayCols.forEach(t => {
    if (!found[t]) found[t] = new Date(today);
  });

  types.forEach(type => {
    const d = found[type];
    if (!d) return;
    const info = typeInfo[type];
    const rel = relativeDay(d);
    const isUrgent = (d - today) / 86400000 <= 1;

    const item = document.createElement('div');
    item.className = 'next-item';
    item.style.setProperty('--card-color', info.color);
    item.innerHTML = `
      <div class="dot"></div>
      <div class="type">${info.emoji} ${info.label}</div>
      <div class="date-info">
        <div class="d">${formatDate(d)}</div>
        <div class="rel${isUrgent ? ' urgent' : ''}">${rel}</div>
      </div>
    `;
    container.appendChild(item);
  });
}

// ── Render calendar ──
function renderCalendar() {
  const title = document.getElementById('calTitle');
  title.textContent = `${viewYear}年 ${monthNames[viewMonth]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  // Fill leading empties
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const cell = document.createElement('div');
    const dow = date.getDay();
    let cls = 'cal-cell';
    if (dow === 0) cls += ' is-sun';
    if (dow === 6) cls += ' is-sat';
    if (date.getTime() === today.getTime()) cls += ' is-today';
    cell.className = cls;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    const cols = getCollections(date, districtKey, kamiKey);
    if (cols.length > 0) {
      const icons = document.createElement('div');
      icons.className = 'gomi-icons';
      cols.forEach(type => {
        const icon = document.createElement('span');
        icon.className = 'gomi-icon';
        icon.textContent = typeInfo[type].emoji;
        icons.appendChild(icon);
      });
      cell.appendChild(icons);
    }

    grid.appendChild(cell);
  }
}

// ── District selection ──
function selectDistrict(btn) {
  document.querySelectorAll('#districtBtns .district-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  districtKey = btn.dataset.key;
  renderAll();
}
function selectKamiDistrict(btn) {
  document.querySelectorAll('#kamiDistrictBtns .district-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  kamiKey = btn.dataset.key;
  renderAll();
}
function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
}

function renderAll() {
  renderToday();
  renderNext();
  renderCalendar();
}

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  // Set default active buttons
  document.querySelector('[data-key="higashi-mokukin"]').classList.add('active');
  document.querySelector('[data-key="kami3"]').classList.add('active');
  renderAll();
});
</script>
</body>
</html>
